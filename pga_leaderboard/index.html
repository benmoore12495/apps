<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PGA Championship 2026 – Pick'em</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111318;
      color: #e8e8e8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      padding: 32px 16px 48px;
    }

    /* ── Header ── */
    .site-header {
      text-align: center;
      margin-bottom: 28px;
    }
    .site-header h1 {
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      font-weight: 800;
      letter-spacing: 0.05em;
      color: #f5c842;
      text-transform: uppercase;
    }
    .site-header .subtitle {
      font-size: 0.95rem;
      color: #9aa0ad;
      margin-top: 4px;
    }
    .last-updated {
      font-size: 0.82rem;
      color: #6b7280;
      margin-top: 10px;
    }

    /* ── Refresh button ── */
    .refresh-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 18px auto 0;
      padding: 12px 28px;
      background: #f5c842;
      color: #111318;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    .refresh-btn:hover { background: #f0bb20; }
    .refresh-btn:active { transform: scale(0.97); }
    .refresh-btn svg { width: 18px; height: 18px; flex-shrink: 0; }
    .refresh-btn.spinning svg { animation: spin 0.9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error banner ── */
    .error-banner {
      display: none;
      background: #3b1a1a;
      border: 1px solid #7f1d1d;
      border-radius: 8px;
      color: #fca5a5;
      font-size: 0.85rem;
      padding: 10px 16px;
      margin: 12px auto;
      max-width: 760px;
      text-align: center;
    }
    .error-banner.visible { display: block; }

    /* ── Layout ── */
    .boards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 1100px;
      margin: 32px auto 20px;
    }
    @media (max-width: 680px) {
      .boards { grid-template-columns: 1fr; }
    }

    /* ── Player card ── */
    .card {
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .card.ben    { background: #1a2740; border-top: 3px solid #3b82f6; }
    .card.andrew { background: #2a1a1a; border-top: 3px solid #ef4444; }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
    }
    .card-name { font-size: 1.3rem; font-weight: 700; }
    .card-scores { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
    .card-top4 { font-size: 1.5rem; font-weight: 800; }
    .card-all5-label { font-size: 0.72rem; color: #6b7280; }
    .card-all5-val { font-size: 0.85rem; font-weight: 600; color: #6b7280; }

    /* ── Table ── */
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: rgba(0,0,0,0.25); }
    thead th {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #6b7280;
      padding: 10px 12px;
      text-align: left;
    }
    thead th:not(:first-child) { text-align: center; }
    tbody tr { border-top: 1px solid rgba(255,255,255,0.05); }

    tbody tr.dropped { opacity: 0.4; }
    tbody tr.dropped td:first-child::after {
      content: " ✕";
      font-size: 0.68rem;
      color: #ef4444;
    }

    tbody tr.leader {
      background: rgba(245, 200, 66, 0.07);
      border-left: 3px solid #f5c842;
    }

    tbody td { padding: 13px 12px; font-size: 0.98rem; }
    tbody td:not(:first-child) { text-align: center; }
    .player-name { font-weight: 600; }

    .leader-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(245, 200, 66, 0.15);
      color: #f5c842;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-radius: 4px;
      padding: 2px 6px;
      margin-left: 7px;
      vertical-align: middle;
    }

    .bonus-tag {
      display: inline-block;
      background: rgba(74, 222, 128, 0.15);
      color: #4ade80;
      font-size: 0.72rem;
      font-weight: 700;
      border-radius: 4px;
      padding: 1px 5px;
      margin-left: 5px;
      vertical-align: middle;
    }

    .score-val { font-weight: 700; font-size: 1.05rem; }
    .under { color: #4ade80; }
    .over  { color: #f87171; }
    .even  { color: #e8e8e8; }

    .round-badge {
      display: inline-block;
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 0.8rem;
      color: #9aa0ad;
    }

    .skeleton {
      background: linear-gradient(90deg,
        rgba(255,255,255,0.04) 25%,
        rgba(255,255,255,0.1) 50%,
        rgba(255,255,255,0.04) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 4px;
      height: 1em;
      display: inline-block;
      min-width: 40px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* ── Summary strip ── */
    .summary {
      max-width: 1100px;
      margin: 0 auto 12px;
      background: #1c1f26;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      overflow: hidden;
    }

    /* Primary row: Top 4 */
    .summary-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
      padding: 22px 28px;
    }
    .summary-row.primary { }
    .summary-row.secondary {
      background: rgba(0,0,0,0.2);
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 14px 28px;
      opacity: 0.55;
    }
    .summary-row.secondary:hover { opacity: 0.75; transition: opacity 0.2s; }

    .sum-side { display: flex; flex-direction: column; gap: 4px; }
    .sum-side.right { align-items: flex-end; }

    .sum-label {
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #6b7280;
    }
    .sum-score.primary-score {
      font-size: 2.4rem;
      font-weight: 800;
      line-height: 1;
    }
    .sum-score.secondary-score {
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1;
    }
    .sum-sublabel {
      font-size: 0.72rem;
      color: #6b7280;
    }

    .sum-vs { text-align: center; }
    .vs-tag {
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #4b5563;
      margin-bottom: 6px;
    }
    .lead-pill {
      display: inline-block;
      background: rgba(245,200,66,0.12);
      color: #f5c842;
      font-size: 0.85rem;
      font-weight: 700;
      border-radius: 999px;
      padding: 5px 14px;
      white-space: nowrap;
    }
    .lead-pill.tied { background: rgba(255,255,255,0.06); color: #9aa0ad; }
    .lead-pill.secondary-pill {
      font-size: 0.75rem;
      padding: 3px 10px;
      background: rgba(255,255,255,0.05);
      color: #9aa0ad;
    }
    .row-tag {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #6b7280;
      text-align: center;
      margin-bottom: 5px;
    }
  </style>
</head>
<body>

<header class="site-header">
  <h1>PGA Championship 2026</h1>
  <p class="subtitle">Pick'em Score Comparison</p>
  <p class="last-updated" id="lastUpdated">–</p>
  <br>
  <button class="refresh-btn" id="refreshBtn" onclick="fetchScores()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
         stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 4 23 10 17 10"></polyline>
      <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
    </svg>
    Refresh Scores
  </button>
  <div class="error-banner" id="errorBanner"></div>
</header>

<!-- Player boards -->
<div class="boards">
  <div class="card ben">
    <div class="card-header">
      <span class="card-name">Ben</span>
      <div class="card-scores">
        <span class="card-top4 score-val" id="benTop4">–</span>
        <span class="card-all5-label">Top 4 &nbsp;|&nbsp; All 5: <span class="card-all5-val" id="benAll5">–</span></span>
      </div>
    </div>
    <table>
      <thead>
        <tr>
          <th>Player</th>
          <th>Score</th>
          <th>Round</th>
          <th>Thru</th>
        </tr>
      </thead>
      <tbody id="benBody"></tbody>
    </table>
  </div>

  <div class="card andrew">
    <div class="card-header">
      <span class="card-name">Andrew</span>
      <div class="card-scores">
        <span class="card-top4 score-val" id="andrewTop4">–</span>
        <span class="card-all5-label">Top 4 &nbsp;|&nbsp; All 5: <span class="card-all5-val" id="andrewAll5">–</span></span>
      </div>
    </div>
    <table>
      <thead>
        <tr>
          <th>Player</th>
          <th>Score</th>
          <th>Round</th>
          <th>Thru</th>
        </tr>
      </thead>
      <tbody id="andrewBody"></tbody>
    </table>
  </div>
</div>

<!-- Comparison summary -->
<div class="summary">

  <!-- Primary: Top 4 -->
  <div class="summary-row primary">
    <div class="sum-side left">
      <span class="sum-label">Ben</span>
      <span class="sum-score primary-score score-val" id="sumBenTop4">–</span>
      <span class="sum-sublabel">Top 4 players</span>
    </div>
    <div class="sum-vs">
      <div class="vs-tag">Top 4</div>
      <div class="lead-pill" id="leadTop4">–</div>
    </div>
    <div class="sum-side right">
      <span class="sum-label">Andrew</span>
      <span class="sum-score primary-score score-val" id="sumAndrewTop4">–</span>
      <span class="sum-sublabel">Top 4 players</span>
    </div>
  </div>

  <!-- Secondary: All 5 (muted) -->
  <div class="summary-row secondary">
    <div class="sum-side left">
      <span class="sum-label">Ben</span>
      <span class="sum-score secondary-score score-val" id="sumBenAll">–</span>
      <span class="sum-sublabel">All 5 players</span>
    </div>
    <div class="sum-vs">
      <div class="vs-tag">All 5</div>
      <div class="lead-pill secondary-pill" id="leadAll">–</div>
    </div>
    <div class="sum-side right">
      <span class="sum-label">Andrew</span>
      <span class="sum-score secondary-score score-val" id="sumAndrewAll">–</span>
      <span class="sum-sublabel">All 5 players</span>
    </div>
  </div>

</div>

<script>
  // ── Picks (use full ESPN display names) ──────────────────────────────────
  const PICKS = {
    ben:    ["Scottie Scheffler", "Xander Schauffele", "Shane Lowry", "Joaquin Niemann", "Cameron Young"],
    andrew: ["Patrick Reed", "Brooks Koepka", "Jon Rahm", "Justin Thomas", "Jordan Spieth"]
  };

  // ESPN treats "Cam Young" as "Cameron Young" — add any other aliases here
  const NAME_ALIASES = {
    "cam young": "cameron young",
    "joaquin niemann": "joaquin niemann"  // normalized from "Joaquín"
  };

  const ESPN_URL =
    "https://site.api.espn.com/apis/site/v2/sports/golf/leaderboard?league=pga";

  // ── Helpers ──────────────────────────────────────────────────────────────
  function formatScore(n) {
    if (n === 0) return "E";
    return n > 0 ? `+${n}` : `${n}`;
  }
  function scoreClass(n) {
    if (n < 0) return "under";
    if (n > 0) return "over";
    return "even";
  }
  function top4Sum(scores) {
    return [...scores].sort((a, b) => a - b).slice(0, 4).reduce((s, v) => s + v, 0);
  }

  // Strip accents + non-alpha so "Joaquín" matches "Joaquin", etc.
  function normalizeName(n) {
    const lower = n.toLowerCase();
    // Apply alias before stripping
    const aliased = NAME_ALIASES[lower] ?? lower;
    return aliased
      .normalize("NFD")
      .replace(/[̀-ͯ]/g, "")
      .replace(/[^a-z]/g, "");
  }

  function setLeadPill(elId, benVal, andrewVal, secondary = false) {
    const el = document.getElementById(elId);
    const diff = Math.abs(benVal - andrewVal);
    let txt, tied = false;
    if (benVal === andrewVal)     { txt = "Tied"; tied = true; }
    else if (benVal < andrewVal)  { txt = `Ben leads by ${diff}`; }
    else                          { txt = `Andrew leads by ${diff}`; }
    el.textContent = txt;
    el.className = secondary
      ? `lead-pill secondary-pill${tied ? " tied" : ""}`
      : `lead-pill${tied ? " tied" : ""}`;
  }

  // ── Skeleton rows ────────────────────────────────────────────────────────
  function renderSkeleton(tbodyId) {
    document.getElementById(tbodyId).innerHTML = Array.from({length: 5}).map(() => `
      <tr>
        <td><span class="skeleton" style="width:130px"></span></td>
        <td><span class="skeleton" style="width:32px"></span></td>
        <td><span class="skeleton" style="width:28px"></span></td>
        <td><span class="skeleton" style="width:22px"></span></td>
      </tr>`).join("");
  }

  // ── Parse ESPN competitor into {score, round, thru} ─────────────────────
  function parseCompetitor(comp) {
    const rawScore = comp?.score?.displayValue ?? "E";
    const score = rawScore === "E" ? 0 : parseInt(rawScore, 10);

    // Round: status.period is 1-4 for golf rounds; guard against stray values
    const period = comp?.status?.period ?? 0;
    const linescoreCount = comp?.linescores?.length ?? 0;
    let round = "–";
    if (period >= 1 && period <= 4) {
      round = `R${period}`;
    } else if (linescoreCount >= 1 && linescoreCount <= 4) {
      round = `R${linescoreCount}`;
    }

    // Thru: status.displayValue wrongly returns the season year (e.g. "2026").
    // The correct field is status.type.shortDetail e.g. "Thru 9", "F", "Thru F"
    const shortDetail = comp?.status?.type?.shortDetail ?? "";
    let thru = "–";
    if (/^F$/i.test(shortDetail) || /thru\s+f/i.test(shortDetail)) {
      thru = "F";
    } else {
      const m = shortDetail.match(/(?:thru\s+)?(\d{1,2})/i);
      if (m) {
        const hole = parseInt(m[1], 10);
        if (hole >= 1 && hole <= 18) thru = String(hole);
      }
    }

    return { score, round, thru };
  }

  // ── Build name → data map from ESPN response ─────────────────────────────
  function buildPlayerMap(data) {
    const map = {};
    const events = data?.events ?? [];
    let competitors = [];
    for (const ev of events) {
      const comps = ev?.competitions?.[0]?.competitors ?? [];
      if (comps.length > 0) { competitors = comps; break; }
    }
    for (const comp of competitors) {
      const displayName = comp?.athlete?.displayName ?? "";
      if (!displayName) continue;
      const key = normalizeName(displayName);
      map[key] = { displayName, ...parseCompetitor(comp) };
    }
    // Determine the leading score across the entire field
    const allScores = Object.values(map).map(p => p.score);
    const leadingScore = allScores.length > 0 ? Math.min(...allScores) : null;
    return { map, leadingScore };
  }

  // ── Render one side's table + return totals ──────────────────────────────
  function renderSide(picks, playerMap, leadingScore, tbodyId, top4ElId, all5ElId) {
    const LEADER_BONUS = -3;

    const rows = picks
      .map(name => {
        const key      = normalizeName(name);
        const data     = playerMap[key] ?? { score: 0, round: "–", thru: "–", missing: true };
        const isLeader = leadingScore !== null && data.score === leadingScore;
        const bonus    = isLeader ? LEADER_BONUS : 0;
        return { name, data, isLeader, bonus, effective: data.score + bonus };
      })
      .sort((a, b) => a.effective - b.effective);

    const effScores = rows.map(r => r.effective);
    const allSum    = effScores.reduce((s, v) => s + v, 0);
    const top4      = top4Sum(effScores);

    // Find which row gets dropped (worst effective score not in best 4)
    const sortedAsc = [...effScores].sort((a, b) => a - b);
    const top4pool  = sortedAsc.slice(0, 4);
    let droppedIdx  = -1;
    const used = new Set();
    for (let i = 0; i < rows.length; i++) {
      const s   = rows[i].effective;
      const idx = top4pool.findIndex((v, j) => v === s && !used.has(j));
      if (idx === -1) { droppedIdx = i; break; }
      used.add(idx);
    }

    document.getElementById(tbodyId).innerHTML = rows.map((r, i) => {
      const sc      = formatScore(r.data.score);
      const cls     = scoreClass(r.data.score);
      const dropped = i === droppedIdx ? " dropped" : "";
      const leaderCls = r.isLeader ? " leader" : "";
      const leaderBadge = r.isLeader
        ? `<span class="leader-badge">&#9733; 1st</span>`
        : "";
      const bonusTag = r.isLeader
        ? `<span class="bonus-tag">−3 bonus</span>`
        : "";
      return `
        <tr class="${dropped}${leaderCls}">
          <td class="player-name">${r.name}${leaderBadge}</td>
          <td><span class="score-val ${cls}">${sc}</span>${bonusTag}</td>
          <td><span class="round-badge">${r.data.round}</span></td>
          <td>${r.data.thru}</td>
        </tr>`;
    }).join("");

    // Card header: show top-4 primary, all-5 secondary
    const top4El = document.getElementById(top4ElId);
    top4El.textContent = formatScore(top4);
    top4El.className   = `card-top4 score-val ${scoreClass(top4)}`;

    const all5El = document.getElementById(all5ElId);
    all5El.textContent = formatScore(allSum);
    all5El.className   = `card-all5-val ${scoreClass(allSum)}`;

    return { allSum, top4 };
  }

  // ── Main fetch ────────────────────────────────────────────────────────────
  async function fetchScores() {
    const btn   = document.getElementById("refreshBtn");
    const errEl = document.getElementById("errorBanner");
    btn.classList.add("spinning");
    errEl.classList.remove("visible");
    renderSkeleton("benBody");
    renderSkeleton("andrewBody");

    try {
      const resp = await fetch(ESPN_URL, { cache: "no-store" });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      const { map: playerMap, leadingScore } = buildPlayerMap(data);

      const benR    = renderSide(PICKS.ben,    playerMap, leadingScore, "benBody",    "benTop4",    "benAll5");
      const andrewR = renderSide(PICKS.andrew, playerMap, leadingScore, "andrewBody", "andrewTop4", "andrewAll5");

      // Summary scores
      const setSumScore = (id, val, primary) => {
        const el = document.getElementById(id);
        el.textContent = formatScore(val);
        el.className   = `sum-score ${primary ? "primary-score" : "secondary-score"} score-val ${scoreClass(val)}`;
      };
      setSumScore("sumBenTop4",    benR.top4,    true);
      setSumScore("sumAndrewTop4", andrewR.top4, true);
      setSumScore("sumBenAll",     benR.allSum,  false);
      setSumScore("sumAndrewAll",  andrewR.allSum, false);

      setLeadPill("leadTop4", benR.top4,    andrewR.top4,    false);
      setLeadPill("leadAll",  benR.allSum,  andrewR.allSum,  true);

      document.getElementById("lastUpdated").textContent =
        `Last updated: ${new Date().toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"})}`;

    } catch (err) {
      errEl.textContent = `Could not load live scores: ${err.message}`;
      errEl.classList.add("visible");
    } finally {
      btn.classList.remove("spinning");
    }
  }

  fetchScores();
</script>
</body>
</html>
