// ─────────────────────────────────────────────────────────────────────────────
// TOURNAMENT CONFIG
// ─────────────────────────────────────────────────────────────────────────────
const TOURNAMENTS = [
  { id: "masters", key: "masters", name: "Masters Tournament",    shortName: "Masters",
    espnMatch: ["Masters Tournament","The Masters","masters tournament"],

    tryNoLeague: false,
    tryCurrentEvent: true,  // Most recent completed event — try no-date param first
    complete: true  },
  { id: "usopen",  key: "usopen",  name: "U.S. Open",             shortName: "US Open",

    complete: false },
];

const ESPN_BASE    = "https://site.api.espn.com/apis/site/v2/sports/golf/leaderboard?league=pga";
const ESPN_NOLEG   = "https://site.api.espn.com/apis/site/v2/sports/golf/leaderboard";

// Cache: tournamentId → { playerMap, worstMadeCutScore, eventName, isLive, isComplete }
const cache = {};

// ─────────────────────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────────────────────
function norm(n) {
  return (n ?? "").toLowerCase().replace(/[^a-z]/g, "");
}

function fmtScore(n) {
  if (n === null || n === undefined || isNaN(n)) return "–";
  if (n === 0) return "E";
  return n > 0 ? `+${n}` : `${n}`;
}

function scoreClass(n) {
  if (n === null || n === undefined || isNaN(n)) return "";
  if (n < 0) return "under";
  if (n > 0) return "over";
  return "even";
}

function switchTab(id) {
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("panel-" + id).classList.add("active");

  document.querySelectorAll(".tab-btn")[idx].classList.add("active");
}

// ─────────────────────────────────────────────────────────────────────────────
// ESPN FETCH
// ─────────────────────────────────────────────────────────────────────────────

function nameMatchesMajor(espnName, t) {
  const n = (espnName ?? "").toLowerCase();
  return t.espnMatch.some(m => n.includes(m.toLowerCase()));
}

function processEvent(event, t) {
  const competitors = event?.competitions?.[0]?.competitors ?? [];
  const eventName   = event?.name ?? t.name;
  const compStatus  = event?.competitions?.[0]?.status?.type?.id ?? "";
  const isLive      = compStatus === "2";
  const isComplete  = compStatus === "3";

  const playerMap      = {};
  const madeCutScores  = [];

  for (const comp of competitors) {
    const displayName = comp?.athlete?.displayName ?? "";
    const rawScore    = comp?.score?.displayValue ?? "E";
    const period      = comp?.status?.period ?? 0;
    const thru        = comp?.status?.displayValue ?? "–";
    const statusId    = comp?.status?.type?.id ?? "";

    const score      = rawScore === "E" ? 0 : parseInt(rawScore, 10);
    const missedCut  = statusId === "6";
    const madecut    = !missedCut && (period >= 4 || (isComplete && statusId === "3"));

    if (madecut) madeCutScores.push(score);

    playerMap[norm(displayName)] = { displayName, score, period, thru, madecut, missedCut };
  }

  const worstMadeCutScore = madeCutScores.length > 0 ? Math.max(...madeCutScores) : null;
  return { playerMap, worstMadeCutScore, eventName, isLive, isComplete };
}

async function tryFetchEvent(url, t) {
  try {
    const resp = await fetch(url, { cache: "no-store" });
    if (!resp.ok) return null;
    const data  = await resp.json();
    const events = data?.events ?? [];
    for (const ev of events) {
      const ename = (ev?.name ?? "") + " " + (ev?.shortName ?? "");
      if (nameMatchesMajor(ename, t)) return processEvent(ev, t);
    }
  } catch {}
  return null;
}

async function fetchTournament(t) {
  if (!t.complete) return null; // Upcoming — nothing to fetch yet

  // Build list of URLs to try in priority order
  const urls = [];

  // 1. For PGA: try no-date endpoint first (most recent completed event)
  if (t.tryCurrentEvent) {
    urls.push(ESPN_BASE);
  }

  // 2. Try each date within the tournament week (final round first)
  for (const d of t.tryDates) {
    urls.push(`${ESPN_BASE}&dates=${d}`);
    // For Masters: also try without league restriction
    if (t.tryNoLeague) urls.push(`${ESPN_NOLEG}?dates=${d}`);
  }

  for (const url of urls) {
    const result = await tryFetchEvent(url, t);
    if (result) return result;
  }

  return null; // Tournament data not available
}

// ─────────────────────────────────────────────────────────────────────────────
// SCORING LOGIC
// ─────────────────────────────────────────────────────────────────────────────
function getPlayerScore(playerName, playerMap, worstMadeCutScore) {
  const key  = norm(playerName);
  const data = playerMap[key];

  if (!data) {
    // Not found in ESPN data — treat as MC if we have a penalty
    return { score: worstMadeCutScore, mc: true, notFound: true, thru: "–", period: 0, displayName: playerName };
  }

  if (data.missedCut) {
    return { ...data, score: worstMadeCutScore ?? data.score, mc: true };
  }

  // If tournament is complete and player only played 2 rounds, they missed cut
  if (data.period === 2 && data.madecut === false) {
    return { ...data, score: worstMadeCutScore ?? data.score, mc: true };
  }

  return { ...data, mc: false };
}

function calcContestantTourneyScore(contestant, tourneyKey, tData) {
  if (!tData) return null;
  const { playerMap, worstMadeCutScore } = tData;
  const picks = contestant.picks[tourneyKey];
  let total = 0;
  for (const p of picks) {
    const r = getPlayerScore(p, playerMap, worstMadeCutScore);
    total += (r.score ?? 0);
  }
  return total;
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDER – OVERALL LEADERBOARD
// ─────────────────────────────────────────────────────────────────────────────
function renderOverall() {
  const tbody = document.getElementById("overall-body");

  // For each contestant, compute score per completed tournament
  const rows = CONTESTANTS.map(c => {
    let total = 0;
    let hasAny = false;
    const tourneyScores = {};

    for (const t of TOURNAMENTS) {
      const tData = cache[t.id];
      if (tData) {
        const s = calcContestantTourneyScore(c, t.key, tData);
        tourneyScores[t.id] = s;
        total += s ?? 0;
        hasAny = true;
      } else {
        tourneyScores[t.id] = null;
      }
    }
    return { name: c.name, tourneyScores, total: hasAny ? total : null };
  });

  // Sort by total (null = no scores yet, goes to bottom)
  rows.sort((a, b) => {
    if (a.total === null && b.total === null) return 0;
    if (a.total === null) return 1;
    if (b.total === null) return -1;
    return a.total - b.total;
  });

  tbody.innerHTML = rows.map((row, i) => {
    const rank = i + 1;
    const rankCls = rank === 1 ? "top1" : rank <= 3 ? "top3" : "";
    const rankDisplay = rank === 1 ? "🏆 1" : rank;

    const tourneyCells = TOURNAMENTS.map(t => {
      const s = row.tourneyScores[t.id];
      if (s === null) {
        const tConfig = TOURNAMENTS.find(x => x.id === t.id);
        if (!tConfig.complete) return `<td><span class="upcoming-badge">TBD</span></td>`;
        return `<td><span class="skeleton" style="width:30px"></span></td>`;
      }
      return `<td><span class="score-val ${scoreClass(s)}">${fmtScore(s)}</span></td>`;
    }).join("");

    const totalCell = row.total === null
      ? `<td><span class="upcoming-badge">–</span></td>`
      : `<td><span class="score-val ${scoreClass(row.total)}" style="font-size:1.05rem;font-weight:800">${fmtScore(row.total)}</span></td>`;

    return `
      <tr>
        <td class="rank-cell ${rankCls}">${rankDisplay}</td>
        <td class="name-cell">${row.name}</td>
        ${tourneyCells}
        ${totalCell}
      </tr>`;
  }).join("");
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDER – SINGLE TOURNAMENT TAB
// ─────────────────────────────────────────────────────────────────────────────
function renderTournament(t) {
  const container = document.getElementById(`${t.id}-content`);
  const tData = cache[t.id];

  // Upcoming with no data yet
  if (!t.complete && !tData) {
    // Show picks preview for upcoming tournament
    const pickRows = CONTESTANTS.map(c => {
      const picks = c.picks[t.key];
      return `
        <tr>
          <td class="name-cell">${c.name}</td>
          <td class="score-val" style="color:#6b7280">${picks[0]}</td>
          <td class="score-val" style="color:#6b7280">${picks[1]}</td>
          <td class="score-val" style="color:#6b7280">${picks[2]}</td>
        </tr>`;
    }).join("");

    container.innerHTML = `
      <div class="tournament-header">
        <div>
          <div class="tournament-title">${t.name}</div>
          <div class="tournament-meta">Starts ${formatDate(t.dates)}</div>
        </div>
        <span class="status-pill upcoming">Upcoming</span>
      </div>
      <div class="picks-preview">
        <div class="picks-preview-title">Player Picks</div>
        <table class="picks-table">
          <thead>
            <tr>
              <th>Contestant</th>
              <th>Pick 1</th>
              <th>Pick 2</th>
              <th>Pick 3</th>
            </tr>
          </thead>
          <tbody>${pickRows}</tbody>
        </table>
      </div>`;
    return;
  }

  if (!tData) {
    container.innerHTML = `
      <div class="tournament-header">
        <div><div class="tournament-title">${t.name}</div></div>
        <span class="status-pill upcoming">Unavailable</span>
      </div>
      <div style="text-align:center;padding:60px;color:#6b7280;font-size:0.9rem">
        Could not load ESPN scores for this tournament.<br>Try refreshing.
      </div>`;
    return;
  }

  const { playerMap, worstMadeCutScore, eventName, isLive, isComplete } = tData;
  const statusLabel = isLive ? "Live" : isComplete ? "Final" : "In Progress";
  const statusCls   = isLive ? "live" : isComplete ? "complete" : "live";

  // Build rows with scores
  const rows = CONTESTANTS.map(c => {
    const picks = c.picks[t.key];
    const pickResults = picks.map(p => getPlayerScore(p, playerMap, worstMadeCutScore));
    const total = pickResults.reduce((s, r) => s + (r.score ?? 0), 0);
    return { name: c.name, picks, pickResults, total };
  });

  rows.sort((a, b) => a.total - b.total);

  const mcPenalty = worstMadeCutScore !== null ? fmtScore(worstMadeCutScore) : "–";

  const pickRows = rows.map((row, i) => {
    const rank = i + 1;
    const rankCls = rank === 1 ? "top1" : rank <= 3 ? "top3" : "";

    const pickCells = row.pickResults.map((r, pi) => {
      const sc   = r.score !== null && r.score !== undefined ? r.score : null;
      const cls  = scoreClass(sc);
      const mcCls = r.mc ? " mc" : "";
      const lastName = r.displayName ? r.displayName.split(" ").slice(-1)[0] : row.picks[pi].split(" ").slice(-1)[0];
      return `
        <td>
          <div class="player-chip${mcCls}">
            <span class="p-name">${lastName}</span>
            <span class="p-score ${cls}">${fmtScore(sc)}</span>
          </div>
        </td>`;
    }).join("");

    return `
      <tr>
        <td class="rank-cell ${rankCls}">${rank === 1 ? "🏆 1" : rank}</td>
        <td class="name-cell">${row.name}</td>
        ${pickCells}
        <td><span class="score-val ${scoreClass(row.total)}" style="font-weight:800">${fmtScore(row.total)}</span></td>
      </tr>`;
  }).join("");

  container.innerHTML = `
    <div class="tournament-header">
      <div>
        <div class="tournament-title">${eventName || t.name}</div>
        <div class="tournament-meta">${formatDate(t.dates)}</div>
      </div>
      <span class="status-pill ${statusCls}">${statusLabel}</span>
    </div>
    <div class="mc-note">MC penalty: ${mcPenalty} · Missed cut players receive worst finisher's score</div>
    <table class="picks-table">
      <thead>
        <tr>
          <th>Rank</th>
          <th>Contestant</th>
          <th>Pick 1</th>
          <th>Pick 2</th>
          <th>Pick 3</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody>${pickRows}</tbody>
    </table>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// UTILITY
// ─────────────────────────────────────────────────────────────────────────────
function formatDate(dateStr) {
  // dateStr like "20260409"
  const y = dateStr.slice(0, 4);
  const m = dateStr.slice(4, 6);
  const d = dateStr.slice(6, 8);
  const dt = new Date(`${y}-${m}-${d}`);
  return dt.toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" });
}

// ─────────────────────────────────────────────────────────────────────────────
// MAIN REFRESH
// ─────────────────────────────────────────────────────────────────────────────
async function refreshAll() {
  const btn   = document.getElementById("refreshBtn");
  const errEl = document.getElementById("errorBanner");
  btn.classList.add("spinning");
  errEl.classList.remove("visible");

  const errors = [];

  await Promise.all(TOURNAMENTS.map(async t => {
    try {
      cache[t.id] = await fetchTournament(t);
    } catch (e) {
      errors.push(`${t.shortName}: ${e.message}`);
      // Keep whatever was in cache (if anything)
    }
  }));

  if (errors.length) {
    errEl.textContent = "Could not load: " + errors.join("; ");
    errEl.classList.add("visible");
  }

  renderOverall();
  for (const t of TOURNAMENTS) renderTournament(t);

  document.getElementById("lastUpdated").textContent =
    `Last updated: ${new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}`;

  btn.classList.remove("spinning");
}

// Load on open
refreshAll();
</script>
