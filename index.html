<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ben's Apps</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111318;
      color: #e8e8e8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
    }

    h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 800;
      color: #f5c842;
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #6b7280;
      margin-bottom: 48px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 900px;
    }

    .app-card {
      background: #1c1f26;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 28px 24px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, transform 0.15s, background 0.2s;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .app-card:hover {
      border-color: #f5c842;
      background: #22252f;
      transform: translateY(-2px);
    }

    .app-icon { font-size: 2rem; }

    .app-name {
      font-size: 1.1rem;
      font-weight: 700;
    }

    .app-desc {
      font-size: 0.85rem;
      color: #9aa0ad;
      line-height: 1.5;
    }

    .app-tag {
      display: inline-block;
      background: rgba(245,200,66,0.12);
      color: #f5c842;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 4px;
      padding: 3px 8px;
      align-self: flex-start;
    }
  </style>
</head>
<body>
  <h1>Ben's Apps</h1>
  <p class="subtitle">A collection of web tools &amp; trackers</p>

  <div class="grid">
    <a class="app-card" href="./pga_leaderboard/">
      <span class="app-icon">⛳</span>
      <span class="app-name">PGA Championship 2026</span>
      <span class="app-desc">Pick'em score comparison — live leaderboard tracking Ben vs Andrew.</span>
      <span class="app-tag">Golf</span>
    </a>
    <a class="app-card" href="./golf_pool/">
      <span class="app-icon">🏌️</span>
      <span class="app-name">2026 Majors Golf Pool</span>
      <span class="app-desc">Uncle's pool — 3 picks per major, 20 contestants, live ESPN scores with missed-cut tracking.</span>
      <span class="app-tag">Golf</span>
    </a>
    <!-- Add new app cards here -->
  </div>
</body>
</html>
